version: "3.8"

services:

  db:
    extends:
      file: ./config/docker/compose/mariadb.yml
      service: mariadb
    networks:
      - fineract-network

  fineract:
    extends:
      file: ./config/docker/compose/fineract.yml
      service: fineract
    ports:
      - "443:8443"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition:  service_started
    env_file:
      - ./config/docker/env/fineract.env
      - ./config/docker/env/fineract-common.env
      - ./config/docker/env/fineract-mariadb.env
      - ./config/docker/env/fineract-keycloak.env
    extra_hosts:
      - "keycloak.local:172.21.0.1"
    networks:
      - fineract-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    command: >
      start-dev
      --health-enabled=true
      --spi-theme-static-max-age=-1
      --spi-theme-cache-themes=false
      --spi-theme-cache-templates=false
      --hostname-strict=false
      --http-enabled=true
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_THEME_DEFAULT: adorsys-tm-01
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "9000:8080"
      - "8180:9000"
    volumes:
      - ./keycloak-theme/theme-1.0.1.jar:/opt/keycloak/providers/theme-1.0.1.jar:ro
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 sh -c 'cat < /dev/null > /dev/tcp/localhost/9000' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - fineract-network

  keycloak-config-cli:
      image: adorsys/keycloak-config-cli:latest
      depends_on:
        keycloak:
          condition: service_healthy
      environment:
        - KEYCLOAK_URL=http://keycloak:8080/
        - KEYCLOAK_USER=admin
        - KEYCLOAK_PASSWORD=admin
        - IMPORT_FILES_LOCATIONS=/config/*
      volumes:
        - ./keycloak-config:/config
      networks:
        - fineract-network

  keycloak-setup:
    build:
      context: .
      dockerfile: Dockerfile.keycloak-setup
    depends_on:
      keycloak-config-cli:
        condition: service_completed_successfully
    networks:
      - fineract-network

  apache-proxy:
    build:
      context: ./config/apache
    depends_on:
      - fineract
      - keycloak
      # - admin-app  # Commented out - image not available in registry
      - cashier-app
      - branchmanager-app
      - accountmanager-app
      # - mifos-app  # Commented out - image not available in registry
    ports:
      - "80:80"
    volumes:
      - ./config/apache/httpd.conf:/usr/local/apache2/conf/httpd.conf
    networks:
      - fineract-network

  # admin-app:
  #   image: ghcr.io/adorsys-gis/fineract-apps/admin-app:latest
  #   container_name: admin_app_test
  #   ports:
  #     - "5172:80"
  #   networks:
  #     - fineract-network

  cashier-app:
    image: ghcr.io/adorsys-gis/fineract-apps/cashier-app:latest
    container_name: cashier_app_test
    ports:
      - "5173:80"
    networks:
      - fineract-network

  branchmanager-app:
    image: ghcr.io/adorsys-gis/fineract-apps/branchmanager-app:latest
    container_name: branchmanager_app_test
    ports:
      - "5174:80"
    networks:
      - fineract-network

  accountmanager-app:
    image: ghcr.io/adorsys-gis/fineract-apps/account-manager-app:latest
    container_name: accountmanager_app_test
    ports:
      - "5175:80"
    networks:
      - fineract-network

  # mifos-app:
  #   image: ghcr.io/adorsys-gis/fineract-apps/mifos-app:latest
  #   container_name: mifos_app_test
  #   ports:
  #     - "5176:80"
  #   networks:
  #     - fineract-network

networks:
  fineract-network:
    driver: bridge
    name: fineract-dev-network
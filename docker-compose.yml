services:
  db:
    extends:
      file: ./config/docker/compose/mariadb.yml
      service: mariadb
  fineract:
    extends:
      file: ./config/docker/compose/fineract.yml
      service: fineract
    ports:
      - "443:8443"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    env_file:
      - ./config/docker/env/fineract.env
      - ./config/docker/env/fineract-common.env
      - ./config/docker/env/fineract-mariadb.env
      - ./config/docker/env/fineract-keycloak.env

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "9000:8080"
      - "8180:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  keycloak-config-cli:
      image: adorsys/keycloak-config-cli:latest
      depends_on:
        keycloak:
          condition: service_healthy
      environment:
        - KEYCLOAK_URL=http://keycloak:8080/
        - KEYCLOAK_USER=admin
        - KEYCLOAK_PASSWORD=admin
        - IMPORT_FILES_LOCATIONS=/config/*
      volumes:
        - ./keycloak-config:/config
  keycloak-setup:
    build:
      context: .
      dockerfile: Dockerfile.keycloak-setup
    depends_on:
      keycloak-config-cli:
        condition: service_completed_successfully
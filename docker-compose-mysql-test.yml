# FOR TESTING PURPOSES ONLY! NOT SUITABLE FOR PRODUCTION USAGE!
services:
  db:
    extends:
      file: ./docker-compose-mysql.yml
      service: mysql

  localstack:
    image: localstack/localstack:2.1
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"

  mock-oauth2-server:
    image: ghcr.io/navikt/mock-oauth2-server:3.0.3
    ports:
      - "9000:9000"
    environment:
      SERVER_PORT: 9000
      JSON_CONFIG: '{ "interactiveLogin": true, "httpServer": "NettyWrapper", "tokenCallbacks": [ { "issuerId": "auth/realms/fineract", "tokenExpiry": 120, "requestMappings": [{ "requestParam": "scope", "match": "fineract", "claims": { "sub": "mifos", "scope": [ "test" ] } } ] } ] }'

  fineract:
    image: fineract:latest
    user: "1000:1000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${PWD}/config/docker/logback/logback-override.xml:/app/logback-override.xml
      - ${PWD}/config/docker/aws/etc/credentials:/etc/aws/credentials:ro
      - ${PWD}/build/fineract/logs:/var/logs/fineract:rw
    tmpfs:
      - /tmp:rw,nosuid,size=256m
    healthcheck:
      test: ["CMD", 'sh', '-c', 'echo -e "Checking for the availability of Fineract server deployment"; while ! nc -z "localhost" 8443; do sleep 1; printf "-"; done; echo -e " >> Fineract server has started";' ]
      timeout: 1s
      retries: 60
    ports:
      - "8443:8443"
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_started
      mock-oauth2-server:
        condition: service_started
    env_file:
      - ./config/docker/env/fineract.env
      - ./config/docker/env/fineract-common.env
      - ./config/docker/env/fineract-mysql.env
    environment:
      AWS_ACCESS_KEY_ID: localstack
      AWS_SECRET_ACCESS_KEY: localstack
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      FINERACT_EXTERNAL_EVENTS_ENABLED: "true"
      FINERACT_REPORT_EXPORT_S3_ENABLED: "true"
      FINERACT_REPORT_EXPORT_S3_BUCKET_NAME: fineract-reports
# FOR TESTING PURPOSES ONLY! NOT SUITABLE FOR PRODUCTION USAGE!

# Docker Compose for Fineract with Embedded Pentaho Plugin
# This uses the custom image with plugins built-in

version: "3.8"

services:

  db:
    extends:
      file: ./config/docker/compose/mariadb.yml
      service: mariadb

  fineract:
    # Use the custom image with embedded plugins
    build:
      context: .
      dockerfile: Dockerfile.plugins
    ports:
      - "443:8443"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    env_file:
      - ./config/docker/env/fineract.env
      - ./config/docker/env/fineract-common.env
      - ./config/docker/env/fineract-mariadb.env
      - ./config/docker/env/fineract-keycloak.env
    # Note: No volume mounts needed for plugins since they're embedded in the image
    # But you might still want to mount logs or other directories
    volumes:
      - ./build/fineract/logs:/var/logs/fineract:rw
    environment:
      # Plugin environment variables are already set in the Dockerfile
      # These are here for clarity and can override Dockerfile defaults if needed
      - FINERACT_PENTAHO_REPORTS_PATH=/pentahoReports/MariaDB/
      - JAVA_TOOL_OPTIONS=-Dloader.path=/app/plugins/

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    command: start-dev --health-enabled=true
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "9000:8080"
      - "8180:9000"
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 sh -c 'cat < /dev/null > /dev/tcp/localhost/9000' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  keycloak-config-cli:
    image: adorsys/keycloak-config-cli:latest
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      - KEYCLOAK_URL=http://keycloak:8080/
      - KEYCLOAK_USER=admin
      - KEYCLOAK_PASSWORD=admin
      - IMPORT_FILES_LOCATIONS=/config/*
    volumes:
      - ./keycloak-config:/config

  keycloak-setup:
    build:
      context: .
      dockerfile: Dockerfile.keycloak-setup
    depends_on:
      keycloak-config-cli:
        condition: service_completed_successfully
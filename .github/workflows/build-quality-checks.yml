name: Fineract Quality Checks

on:
  workflow_call:
    secrets:
      DEVELOCITY_ACCESS_KEY:
        required: false

permissions:
  contents: read

jobs:
  javadoc:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    env:
      TZ: Asia/Kolkata
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Download workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: fineract-workspace-${{ github.run_id }}
          path: .

      - name: Extract workspace
        run: tar -xf fineract-workspace.tar

      - name: Setup Gradle and Validate Wrapper
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true

      - name: Generate Javadocs
        run: ./gradlew javadoc

      - name: Archive Javadoc reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: javadoc-reports-quality-checks
          path: '**/build/docs/javadoc/'
          if-no-files-found: ignore
          retention-days: 5
          compression-level: 9

  checkstyle:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      TZ: Asia/Kolkata
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Download workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: fineract-workspace-${{ github.run_id }}
          path: .

      - name: Extract workspace
        run: tar -xf fineract-workspace.tar

      - name: Setup Gradle and Validate Wrapper
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest checkstyleJmh

      - name: Archive Checkstyle reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: checkstyle-reports-quality-checks
          path: '**/build/reports/checkstyle/'
          if-no-files-found: ignore
          retention-days: 5
          compression-level: 9

  rat:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      TZ: Asia/Kolkata
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Download workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: fineract-workspace-${{ github.run_id }}
          path: .

      - name: Extract workspace
        run: tar -xf fineract-workspace.tar

      - name: Setup Gradle and Validate Wrapper
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true

      - name: Run RAT
        run: ./gradlew rat

      - name: Archive RAT reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rat-reports-quality-checks
          path: '**/build/reports/rat/'
          if-no-files-found: ignore
          retention-days: 5
          compression-level: 9

  spotbugs:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      TZ: Asia/Kolkata
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Download workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: fineract-workspace-${{ github.run_id }}
          path: .

      - name: Extract workspace
        run: tar -xf fineract-workspace.tar

      - name: Setup Gradle and Validate Wrapper
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true

      - name: Run SpotBugs
        run: ./gradlew spotbugsMain spotbugsTest

      - name: Archive SpotBugs reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spotbugs-reports-quality-checks
          path: '**/build/reports/spotbugs/'
          if-no-files-found: ignore
          retention-days: 5
          compression-level: 9

  spotless:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      TZ: Asia/Kolkata
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Download workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: fineract-workspace-${{ github.run_id }}
          path: .

      - name: Extract workspace
        run: tar -xf fineract-workspace.tar

      - name: Setup Gradle and Validate Wrapper
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true

      - name: Run Spotless
        run: ./gradlew spotlessCheck

name: Sync Upstream Apache Fineract

on:
  schedule:
    - cron: '0 6 * * 1' # every monday at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout fork
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/apache/fineract.git || true
          git fetch upstream develop

      - name: Compute branch name
        id: branch
        run: |
          BRANCH_NAME="sync/upstream-$(date +%Y-%m)"
          echo "name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Check if sync is needed
        id: check
        run: |
          BEHIND=$(git rev-list --count develop..upstream/develop)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -eq 0 ]; then
            echo "Already up to date with upstream. Nothing to do."
          else
            echo "Fork is $BEHIND commits behind upstream."
          fi

      - name: Create sync branch and merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${{ steps.branch.outputs.name }}" develop

          if git merge upstream/develop --no-edit; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            git push -u origin "${{ steps.branch.outputs.name }}"
          else
            echo "status=conflicts" >> "$GITHUB_OUTPUT"
            # Capture conflicting files for the issue
            CONFLICTS=$(git diff --name-only --diff-filter=U | head -30)
            echo "conflicts<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CONFLICTS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            git merge --abort
          fi

      - name: Create PR on successful merge
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.status == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: sync upstream Apache Fineract (${{ steps.check.outputs.behind }} commits)" \
            --body "$(cat <<'BODY'
          ## Upstream Sync

          This PR merges the latest changes from [apache/fineract](https://github.com/apache/fineract) `develop` branch.

          - **Commits behind:** ${{ steps.check.outputs.behind }}
          - **Branch:** `${{ steps.branch.outputs.name }}`
          - **Auto-merged:** Yes (no conflicts detected)

          ### Review checklist
          - [ ] Custom plugins compile (`custom/adorsys/`)
          - [ ] Docker images build correctly
          - [ ] Config CLI still works
          - [ ] Database migrations apply cleanly
          - [ ] CI pipeline passes

          ---
          *Auto-generated by the monthly upstream sync workflow.*
          BODY
          )" \
            --base develop \
            --head "${{ steps.branch.outputs.name }}" \
            --label "upstream-sync"

      - name: Create issue on merge conflicts
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.status == 'conflicts'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Upstream sync failed: merge conflicts detected ($(date +%Y-%m))" \
            --body "$(cat <<BODY
          ## Upstream Sync Failed

          The automated monthly sync with [apache/fineract](https://github.com/apache/fineract) \`develop\` encountered merge conflicts.

          - **Commits behind:** ${{ steps.check.outputs.behind }}
          - **Target branch:** \`${{ steps.branch.outputs.name }}\`

          ### Conflicting files
          \`\`\`
          ${{ steps.merge.outputs.conflicts }}
          \`\`\`

          ### Manual resolution required
          \`\`\`bash
          git fetch upstream develop
          git checkout -b ${{ steps.branch.outputs.name }} develop
          git merge upstream/develop
          # Resolve conflicts, then:
          git add .
          git commit
          git push -u origin ${{ steps.branch.outputs.name }}
          \`\`\`

          ---
          *Auto-generated by the monthly upstream sync workflow.*
          BODY
          )" \
            --label "upstream-sync"

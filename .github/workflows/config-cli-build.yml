name: Config-CLI Build and Test

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'fineract-adorsys-data-collection/fineract-config-cli/**'
      - '.github/workflows/config-cli-build.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'fineract-adorsys-data-collection/fineract-config-cli/**'

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: fineract-adorsys-data-collection/fineract-config-cli

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean package -DskipTests -B

      - name: Run Spotless check
        run: mvn spotless:check

      - name: Archive build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fineract-config-cli-jar
          path: fineract-adorsys-data-collection/fineract-config-cli/target/fineract-config-cli.jar
          retention-days: 1

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build Docker image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: fineract-adorsys-data-collection/fineract-config-cli
          file: fineract-adorsys-data-collection/fineract-config-cli/Dockerfile
          push: false
          tags: fineract-config-cli:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker run --rm fineract-config-cli:$IMAGE_TAG --version || true

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: fineract-adorsys-data-collection/fineract-config-cli

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Spotless check
        run: mvn spotless:check

      - name: Check code formatting
        run: |
          mvn spotless:check || {
            echo "Code formatting issues found. Run 'mvn spotless:apply' locally to fix."
            exit 1
          }

name: Config-CLI Docker Image CI

on:
  push:
    branches:
      - main
      - develop
      - fix/config-cli-workflow
    paths:
      - 'fineract-adorsys-data-collection/fineract-config-cli/src/**'
      - 'fineract-adorsys-data-collection/fineract-config-cli/pom.xml'
      - 'fineract-adorsys-data-collection/fineract-config-cli/Dockerfile'
      - '.github/workflows/config-cli-docker-publish.yml'

  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'fineract-adorsys-data-collection/fineract-config-cli/Dockerfile'

  schedule:
    - cron: '0 0 * * 1'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/fineract-config-cli

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=snapshot,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: fineract-adorsys-data-collection/fineract-config-cli
          file: fineract-adorsys-data-collection/fineract-config-cli/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: Config-CLI Docker Image CI

on:
  push:
    branches:
      - main
      - develop
      - fix/config-cli-workflow
    paths:
      - 'fineract-adorsys-data-collection/fineract-config-cli/src/**'
      - 'fineract-adorsys-data-collection/fineract-config-cli/pom.xml'
      - 'fineract-adorsys-data-collection/fineract-config-cli/Dockerfile'
      - '.github/workflows/config-cli-docker-publish.yml'

  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'docs/data-collection/fineract-config-cli/Dockerfile'

  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/fineract-config-cli

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=snapshot,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: docs/data-collection/fineract-config-cli
          file: docs/data-collection/fineract-config-cli/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

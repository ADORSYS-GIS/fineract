name: Fineract CI

on:
  push:
    branches:
      - develop
      - 'release/**'
      - '1.*'
    paths-ignore:
      - '**/*.md'
  pull_request:
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-core:
    uses: ./.github/workflows/build-core.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  build-embeddable-progressive-loan-jar:
    needs: build-core
    uses: ./.github/workflows/build-progressive-loan.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  build-docker-image:
    needs: build-core
    uses: ./.github/workflows/build-docker.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  build-documentation:
    needs: build-core
    uses: ./.github/workflows/build-documentation.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  run-quality-checks:
    needs: build-core
    uses: ./.github/workflows/build-quality-checks.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  run-cucumber-tests:
    needs: build-core
    uses: ./.github/workflows/build-cucumber.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  run-integrations-tests-on-postgresql:
    needs: build-core
    uses: ./.github/workflows/build-postgresql.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  run-integrations-tests-on-mysql:
    needs: build-core
    uses: ./.github/workflows/build-mysql.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  run-integrations-tests-on-mariadb:
    needs: build-core
    uses: ./.github/workflows/build-mariadb.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  run-e2e-tests:
    needs: build-core
    uses: ./.github/workflows/build-e2e-tests.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  run-liquibase-only-on-postgresql:
    needs: build-core
    uses: ./.github/workflows/liquibase-only-postgresql.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  run-messaging-smoke-tests:
    needs: build-core
    uses: ./.github/workflows/smoke-messaging.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  run-api-backward-compatibility:
    needs: build-core
    uses: ./.github/workflows/verify-api-backward-compatibility.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  run-liquibase-backward-compatibility:
    needs: build-core
    uses: ./.github/workflows/verify-liquibase-backward-compatibility.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  run-liquibase-ddl-safety:
    needs: build-core
    uses: ./.github/workflows/verify-liquibase-ddl-safety.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  run-regression-safety-db-changes:
    needs: build-core
    uses: ./.github/workflows/regression-safety-db-changes.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  run-sonarqube:
    needs: build-core
    uses: ./.github/workflows/sonarqube.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONARCLOUD_TOKEN: ${{ secrets.SONARCLOUD_TOKEN }}

  run-integration-tests-sequentially-on-postgresql:
    needs: build-core
    uses: ./.github/workflows/run-integration-test-sequentially-postgresql.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  publish-dockerhub:
    needs: build-core
    uses: ./.github/workflows/publish-dockerhub.yml
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  cleanup-workspace-artifact:
    needs:
      - build-core
      - build-embeddable-progressive-loan-jar
      - build-docker-image
      - build-documentation
      - run-quality-checks
      - run-cucumber-tests
      - run-integrations-tests-on-postgresql
      - run-integrations-tests-on-mysql
      - run-integrations-tests-on-mariadb
      - run-e2e-tests
      - run-liquibase-only-on-postgresql
      - run-messaging-smoke-tests
      - run-api-backward-compatibility
      - run-liquibase-backward-compatibility
      - run-liquibase-ddl-safety
      - run-regression-safety-db-changes
      - run-sonarqube
      - run-integration-tests-sequentially-on-postgresql
      - publish-dockerhub
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete workspace artifact
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          ARTIFACT_NAME: fineract-workspace-${{ github.run_id }}
        run: |
          set -euo pipefail

          artifact_ids="$(gh api --method GET --paginate "repos/${REPOSITORY}/actions/artifacts" \
            -f name="$ARTIFACT_NAME" \
            --jq '.artifacts[].id')"

          if [ -z "$artifact_ids" ]; then
            echo "No workspace artifact found for ${ARTIFACT_NAME}."
            exit 0
          fi

          deleted=0
          while IFS= read -r artifact_id; do
            [ -n "$artifact_id" ] || continue
            gh api --method DELETE "repos/${REPOSITORY}/actions/artifacts/${artifact_id}"
            deleted=$((deleted + 1))
            echo "Deleted workspace artifact ${ARTIFACT_NAME} (${artifact_id})."
          done <<< "$artifact_ids"

          echo "Deleted ${deleted} workspace artifact(s)."

name: Build and Push Fineract Image

on:
  push:
    branches:
      - 9-create-and-publish-apache-fineract-docker-image
  workflow_dispatch:   # allow manual runs from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image with Jib
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/fineract
          
          echo "Building image with commit SHA tag"
          ./gradlew :fineract-provider:jib \
            -Djib.to.image=$IMAGE:${{ github.sha }}

          echo "Also tagging as latest"
          ./gradlew :fineract-provider:jib \
            -Djib.to.image=$IMAGE:latest

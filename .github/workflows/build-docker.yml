name: Fineract Docker Builds

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        db_type: [mariadb, postgresql]
        include:
          - db_type: mariadb
            compose_file: docker-compose.yml
            check_worker_health: true
          - db_type: postgresql
            compose_file: docker-compose-postgresql.yml
            check_worker_health: false

    env:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
      IMAGE_NAME: fineract

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v5
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0

      - name: Build the image
        run: ./gradlew --no-daemon --console=plain :fineract-provider:jibDockerBuild -Djib.to.image=$IMAGE_NAME -x test -x cucumber

      - name: Start the ${{ matrix.db_type }} stack
        run: docker compose -f ${{ matrix.compose_file }} up -d
      - name: Wait for keycloak to become healthy and dump logs on failure
        run: |
          COMPOSE_FILE="${{ matrix.compose_file }}"
          NAME="fineract-keycloak-1"
          ATTEMPTS=40
          while [ $ATTEMPTS -gt 0 ]; do
            STATUS="$(docker inspect --format='{{.State.Health.Status}}' $NAME 2>/dev/null)"
            if [ "$STATUS" = "healthy" ]; then
              echo "Keycloak container is healthy."
              break
            fi
            echo "Waiting for ${NAME} to become healthy (current status: ${STATUS:-not running}, attempts left: $ATTEMPTS)"
            docker compose -f "$COMPOSE_FILE" ps
            ATTEMPTS=$((ATTEMPTS - 1))
            sleep 10
          done

          if [ "$STATUS" != "healthy" ]; then
            echo "Keycloak container did not become healthy in time."
            echo "=== Keycloak last 300 lines ==="
            docker compose -f "$COMPOSE_FILE" logs --no-color --tail=300 keycloak || true
            echo "=== Docker inspect (State) ==="
            docker inspect --format '{{json .State}}' $NAME || true
            exit 1
          fi

      - name: Check the stack
        run: docker ps

      - name: Check health Manager
        run: curl -f -k --retry 60 --retry-all-errors --connect-timeout 30 --retry-delay 30 https://localhost:8443/fineract-provider/actuator/health

      - name: Check info Manager
        run: (( $(curl -f -k --retry 5 --retry-all-errors --connect-timeout 30 --retry-delay 30 https://localhost:8443/fineract-provider/actuator/info | wc --chars) > 100 ))

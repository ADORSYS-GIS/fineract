name: Fineract Publish to GitHub Container Registry
on:
  push:
    branches:
      - develop
      - 66-write-a-docker-image-and-cicd-workflow-to-deploy-fineract-with-all-our-plugins-such-as-pentaho-and-sms-and-extensions
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0

      - name: Get Git Hashes
        run: |
          echo "short_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "long_hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "owner_lowercase=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
        id: git_hashes

      - name: Build the Apache Fineract image
        run:  |
          TAGS="${{ steps.git_hashes.outputs.short_hash }},${{ steps.git_hashes.outputs.long_hash }}"
          if [ "${{ github.ref_name }}" == "develop" ]; then
            TAGS="$TAGS,latest"
          fi
          ./gradlew --no-daemon --console=plain :fineract-provider:jib -x test -x cucumber \
            -Djib.from.platforms=linux/amd64,linux/arm64 \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }} \
            -Djib.to.image=ghcr.io/${{ steps.git_hashes.outputs.owner_lowercase }}/fineract \
            -Djib.to.tags=$TAGS

      - name: Build Fineract image with embedded plugins
        run:  |
          # Build the custom image with plugins
          docker build -f Dockerfile.plugins -t ghcr.io/${{ steps.git_hashes.outputs.owner_lowercase }}/fineract:with-plugins .

          # Tag with version tags
          TAGS="${{ steps.git_hashes.outputs.short_hash }},${{ steps.git_hashes.outputs.long_hash }}"
          if [ "${{ github.ref_name }}" == "develop" ]; then
            TAGS="$TAGS,latest"
          fi

          # Create tags for the plugin-enhanced image
          for tag in $(echo $TAGS | tr ',' '\n'); do
            docker tag ghcr.io/${{ steps.git_hashes.outputs.owner_lowercase }}/fineract:with-plugins \
                      ghcr.io/${{ steps.git_hashes.outputs.owner_lowercase }}/fineract:with-plugins-$tag
          done

      - name: Push plugin-enhanced image to GHCR
        run:  |
          # Push all tags for the plugin-enhanced image
          docker push ghcr.io/${{ steps.git_hashes.outputs.owner_lowercase }}/fineract:with-plugins
          docker push ghcr.io/${{ steps.git_hashes.outputs.owner_lowercase }}/fineract:with-plugins-${{ steps.git_hashes.outputs.short_hash }}
          docker push ghcr.io/${{ steps.git_hashes.outputs.owner_lowercase }}/fineract:with-plugins-${{ steps.git_hashes.outputs.long_hash }}

          if [ "${{ github.ref_name }}" == "develop" ]; then
            docker push ghcr.io/${{ steps.git_hashes.outputs.owner_lowercase }}/fineract:with-plugins-latest
          fi

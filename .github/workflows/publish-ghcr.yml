name: Fineract Publish to GitHub Container Registry
on:
  push:
    branches:
      - develop
concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0

      - name: Get Git Hashes
        id: git_hashes
        run: |
          echo "short_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "long_hash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "owner_lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Prepare Pentaho Plugin
        run: |
          echo "Preparing Pentaho Plugin..."
          mkdir -p pentaho-dist/plugins
          mkdir -p pentaho-dist/reports

          # Unzip the plugin
          unzip -o fineract-adorsys-pentaho/MifosSecurityPlugin-1.12.1.zip -d pentaho-temp

          # Copy JARs (Handling potential internal folder structure)
          if [ -d "pentaho-temp/MifosSecurityPlugin-1.12.1/lib" ]; then
            echo "Found lib directory, copying JARs..."
            cp pentaho-temp/MifosSecurityPlugin-1.12.1/lib/*.jar pentaho-dist/plugins/
          else
            echo "Copying JARs from root..."
            cp pentaho-temp/MifosSecurityPlugin-1.12.1/*.jar pentaho-dist/plugins/ || echo "No JARs found in root either!"
          fi

          # Copy Reports (From the repo folder using Postgresql)
          echo "Copying Reports..."
          cp -r fineract-adorsys-pentaho/MifosSecurityPlugin-1.12.1/Postgresql pentaho-dist/reports/

          echo "Pentaho preparation complete."
          ls -R pentaho-dist

      - name: Build the Apache Fineract image
        env:
          SHORT_HASH: ${{ steps.git_hashes.outputs.short_hash }}
          LONG_HASH: ${{ steps.git_hashes.outputs.long_hash }}
          OWNER_LOWER: ${{ steps.git_hashes.outputs.owner_lowercase }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |
          TAGS="$SHORT_HASH,$LONG_HASH"
          if [ "$REF_NAME" == "develop" ]; then
            TAGS="$TAGS,latest"
          fi
          ./gradlew --no-daemon --console=plain :custom:docker:jib -x test -x cucumber \
            -Djib.from.platforms=linux/amd64,linux/arm64 \
            -Djib.to.auth.username="$ACTOR" \
            -Djib.to.auth.password="${{ secrets.GITHUB_TOKEN }}" \
            -Djib.to.image=ghcr.io/$OWNER_LOWER/fineract \
            -Djib.to.tags="$TAGS" \
            -Djib.sendTimeout=300000 \
            -Djib.readTimeout=300000
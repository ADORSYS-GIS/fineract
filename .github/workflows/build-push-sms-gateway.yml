name: Build & Push SMS Gateway Native Image

on:
  push:
    branches:
      - develop
      - main
    tags:
      - 'v*'
    paths:
      - 'fineract-adorsys-sms-gateway/**'
      - '.github/workflows/build-push-sms-gateway.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/sms-gateway

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: "0"
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: |
          cd fineract-adorsys-sms-gateway
          mvn clean package -DskipTests

      - name: Set up QEMU (for cross‑architecture emulation)
        uses: docker/setup-qemu-action@53851d14592bedcffcf25ea515637cff71ef929a # v3

      - name: Set up Docker Buildx (multi‑arch builder)
        uses: docker/setup-buildx-action@f7ce87e1d625ad5d6d06e080c3a1d3efc3e9b036 # v3

      - name: Lowercase the repository name
        id: string
        uses: AsZc/change-string-case-action@d0603cd0a7dd490be678164909f65c7737470a7f # v6
        with:
          string: ${{ env.IMAGE_NAME }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=sha,format=long
            type=ref,event=branch
            type=schedule,pattern={{date 'YYYYMMDD-hhmmss' tz='Africa/Douala'}}
            type=semver,pattern={{version}},enable=true,priority=900
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}


          flavor: |
            latest=false
          images: "${{ env.REGISTRY }}/${{ steps.string.outputs.lowercase }}"

      - name: Log in to GHCR
        uses: docker/login-action@5b3c1af5b71da728e1d7a6ca7b51ce3c54701064 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi‑arch image
        uses: docker/build-push-action@ca877a92465040a4c2d5ae34e308df08e4538434 # v6
        with:
          context: fineract-adorsys-sms-gateway
          file: fineract-adorsys-sms-gateway/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: "true"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=shared
          cache-to: type=gha,mode=max,scope=shared
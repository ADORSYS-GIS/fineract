name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/fineract-config-cli

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Update Maven version
        run: |
          mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }}
          mvn versions:commit

      - name: Build with Maven
        run: mvn clean package -DskipTests -B

      - name: Run tests
        run: mvn test -B

      - name: Generate checksums
        run: |
          cd target
          sha256sum fineract-config-cli.jar > fineract-config-cli.jar.sha256
          md5sum fineract-config-cli.jar > fineract-config-cli.jar.md5

      - name: Create release notes
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## Fineract Config CLI v${{ steps.version.outputs.VERSION }}

          ### Features
          - Configuration-as-Code for Apache Fineract
          - Support for 40+ entity types across 6 phases
          - Interactive Spring Shell CLI
          - Import, Export, and Validate commands
          - Dry-run mode for safe previews
          - State management with checksum tracking
          - OAuth2 authentication with token refresh

          ### Installation

          #### Using JAR
          ```bash
          # Download the JAR
          wget https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/fineract-config-cli.jar

          # Run the CLI
          java -jar fineract-config-cli.jar
          ```

          #### Using Docker
          ```bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          docker run -it ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          ```

          #### Using Docker Compose
          ```bash
          # Download docker-compose.yml
          wget https://raw.githubusercontent.com/${{ github.repository }}/v${{ steps.version.outputs.VERSION }}/docker-compose.yml

          # Start services
          docker-compose up -d
          ```

          ### Quick Start
          ```bash
          # Import configuration
          import --file config.yml

          # Preview changes (dry-run)
          import --file config.yml --dry-run

          # Export configuration
          export --output export.yml

          # Validate configuration
          validate --file config.yml
          ```

          ### Documentation
          - [README](https://github.com/${{ github.repository }}/blob/v${{ steps.version.outputs.VERSION }}/README.md)
          - [Usage Guide](https://github.com/${{ github.repository }}/blob/v${{ steps.version.outputs.VERSION }}/USAGE.md)
          - [Configuration Reference](https://github.com/${{ github.repository }}/blob/v${{ steps.version.outputs.VERSION }}/CONFIGURATION.md)

          ### Checksums
          - SHA256: `$(cat target/fineract-config-cli.jar.sha256 | awk '{print $1}')`
          - MD5: `$(cat target/fineract-config-cli.jar.md5 | awk '{print $1}')`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            target/fineract-config-cli.jar
            target/fineract-config-cli.jar.sha256
            target/fineract-config-cli.jar.md5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.version.outputs.VERSION }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.version.outputs.VERSION }}
            type=semver,pattern={{major}},value=v${{ steps.version.outputs.VERSION }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate image digest
        run: |
          echo "Docker image pushed with tags:"
          echo "${{ steps.meta.outputs.tags }}"

  publish-to-maven-central:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: build-and-release
    if: false  # Disabled by default - enable when OSSRH is configured

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update Maven version
        run: |
          mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }}
          mvn versions:commit

      - name: Publish to Maven Central
        run: mvn clean deploy -DskipTests -B
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

twilio:
  account:
    sid: ${TWILIO_ACCOUNT_SID:}
  auth:
    token: ${TWILIO_AUTH_TOKEN:}
  sender:
    number: ${TWILIO_SENDER_NUMBER:}

orange:
  client:
    id: ${ORANGE_CLIENT_ID:}
    secret: ${ORANGE_CLIENT_SECRET:}
  token:
    url: ${ORANGE_TOKEN_URL:}
  sms:
    base:
      url: ${ORANGE_SMS_BASE_URL:}
  sender:
    address: ${ORANGE_SENDER_ADDRESS:}
    name: ${ORANGE_SENDER_NAME:}
  country:
    code: ${ORANGE_COUNTRY_CODE:237}

avlytext:
  api:
    key: ${AVLYTEXT_API_KEY:}
  base:
    url: ${AVLYTEXT_BASE_URL:}
  sender:
    id: ${AVLYTEXT_SENDER_ID:}

fineract:
  api:
    url: ${FINERACT_API_URL:https://fineract:8443/fineract-provider/api/v1}
    user: ${FINERACT_API_USER:mifos}
    password: ${FINERACT_API_PASSWORD:password}
    tenant: ${FINERACT_API_TENANT:default}
  auth:
    type: ${FINERACT_AUTH_TYPE:basic}
keycloak:
  url: ${KEYCLOAK_URL:http://localhost:9000/realms/fineract/protocol/openid-connect/token}
  grant-type: ${KEYCLOAK_GRANT_TYPE:password}
  client-id: ${KEYCLOAK_CLIENT_ID:setup-app-client}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:**********}

sms:
  provider:
    primary: ${SMS_PROVIDER_PRIMARY:twilio}
    fallback: ${SMS_PROVIDER_FALLBACK:}
  custom-http:
    url: ${SMS_CUSTOM_HTTP_URL:}
    api-key: ${SMS_CUSTOM_HTTP_API_KEY:}
    sender: ${SMS_CUSTOM_HTTP_SENDER:Webank}
  sns:
    region: ${SMS_SNS_REGION:}
    sender-id: ${SMS_SNS_SENDER_ID:Webank}
    max-price: ${SMS_SNS_MAX_PRICE:}
  whatsapp:
    base-url: ${SMS_WHATSAPP_BASE_URL:}
    device-id: ${SMS_WHATSAPP_DEVICE_ID:}
  mock:
    enabled: ${SMS_MOCK_ENABLED:false}

logging:
  level:
    com.example.smsgateway.provider.OrangeSmsProvider: DEBUG

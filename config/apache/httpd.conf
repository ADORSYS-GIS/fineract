# Apache HTTP Configuration for Fineract Docker Compose
# Based on the Kubernetes production configuration

# Load required Apache modules
LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule auth_openidc_module modules/mod_auth_openidc.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule socache_shmcb_module modules/mod_socache_shmcb.so
LoadModule authn_core_module modules/mod_authn_core.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule authz_user_module modules/mod_authz_user.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule ssl_module modules/mod_ssl.so
LoadModule proxy_connect_module modules/mod_proxy_connect.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
LoadModule headers_module modules/mod_headers.so

# Additional modules from K8s setup for enhanced functionality
LoadModule status_module modules/mod_status.so
LoadModule dir_module modules/mod_dir.so
LoadModule alias_module modules/mod_alias.so
LoadModule mime_module modules/mod_mime.so
LoadModule setenvif_module modules/mod_setenvif.so

ServerName apache-proxy

User daemon
Group daemon

Listen 80

# Logging configuration
LogLevel warn
ErrorLog /proc/self/fd/2

<IfModule log_config_module>
    LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
    LogFormat "%h %l %u %t \"%r\" %>s %b" common
    CustomLog /proc/self/fd/1 combined
</IfModule>

# Health check endpoints (before VirtualHost)
<Location /health>
    SetHandler server-status
    Require all granted
</Location>

<Location /server-status>
    SetHandler server-status
    Require all granted
</Location>

<VirtualHost *:80>
    ServerName localhost
    ProxyPreserveHost On

    # SSL Proxy configuration for Fineract API
    SSLProxyEngine on
    SSLProxyVerify none
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off
    SSLProxyCheckPeerExpire off

    #============================================================================
    # OIDC CONFIGURATION (Based on K8s setup)
    #============================================================================

    OIDCCryptoPassphrase a-very-secret-passphrase

    # Apache uses Docker service name to connect to Keycloak for metadata
    OIDCProviderMetadataURL http://keycloak:8080/realms/fineract/.well-known/openid-configuration

    # Override issuer and endpoints so browser can access Keycloak at localhost:9000
    OIDCProviderIssuer http://localhost:9000/realms/fineract
    OIDCProviderAuthorizationEndpoint http://localhost:9000/realms/fineract/protocol/openid-connect/auth
    OIDCProviderTokenEndpoint http://keycloak:8080/realms/fineract/protocol/openid-connect/token
    OIDCProviderTokenEndpointAuth client_secret_basic
    OIDCProviderUserInfoEndpoint http://keycloak:8080/realms/fineract/protocol/openid-connect/userinfo
    OIDCProviderJwksUri http://keycloak:8080/realms/fineract/protocol/openid-connect/certs

    OIDCClientID web-client
    OIDCClientSecret **********

    # Single callback URL for all apps
    OIDCRedirectURI http://localhost/oauth2callback

    # Session configuration from K8s
    OIDCSessionType server-cache
    OIDCSessionMaxDuration 14400
    OIDCSessionInactivityTimeout 1800

    # Cache configuration
    OIDCCacheType shm

    # Cookie configuration
    OIDCCookiePath /
    OIDCCookieSameSite On

    # Scope and claims configuration
    OIDCScope "openid profile email roles"
    OIDCRemoteUserClaim preferred_username
    OIDCPassClaimsAs headers
    OIDCPassIDTokenAs payload
    OIDCPassRefreshToken On

    # Prefix used for exported claims in environment vars
    OIDCClaimPrefix "OIDC_CLAIM_"

    #============================================================================
    # SECURITY HEADERS (From K8s setup)
    #============================================================================

    # CORS Headers
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Fineract-Platform-TenantId"
    Header always set Access-Control-Max-Age "3600"

    # Security Headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    #============================================================================
    # FINERACT API BACKEND (Simple routing for development)
    #============================================================================

    ProxyPass /fineract-provider/ https://fineract:8443/fineract-provider/
    ProxyPassReverse /fineract-provider/ https://fineract:8443/fineract-provider/

    # Inject OIDC token into Fineract API requests
    <Location /fineract-provider/api/>
        AuthType openid-connect
        Require valid-user
        RequestHeader set Authorization "Bearer %{OIDC_access_token}e"
        RequestHeader set Fineract-Platform-TenantId "default"
    </Location>

    #============================================================================
    # OAUTH2 CALLBACK HANDLER
    #============================================================================

    # OAuth2 callback endpoint - handled by mod_auth_openidc
    # This MUST come before any ProxyPass directives
    <Location /oauth2callback>
        AuthType openid-connect
        Require valid-user
    </Location>

    #============================================================================
    # FRONTEND WEB APPLICATIONS (Protected by OIDC)
    # Using Docker service names and correct internal ports
    #============================================================================

    # Admin App - /admin/* (Commented out - image not available)
    # <Location /admin>
    #     AuthType openid-connect
    #     Require valid-user
    #     ProxyPass           http://admin-app:80/
    #     ProxyPassReverse    http://admin-app:80/
    # </Location>

    # Account Manager App - /account/*
    # The app is built to be served at /account/ path (not /account-manager/)
    <Location /account>
        AuthType openid-connect
        Require valid-user
        ProxyPass           http://accountmanager-app:80/account/
        ProxyPassReverse    http://accountmanager-app:80/account/

        # Export JWT claims
        RequestHeader set X-Staff-Id "%{OIDC_CLAIM_staffId}e"
        Header set Set-Cookie "staffId=%{OIDC_CLAIM_staffId}e; Path=/; SameSite=Lax"
    </Location>

    # Branch Manager App - /branchmanager/*
    # The app is built to be served at /branchmanager/ path (not /branch-manager/)
    <Location /branchmanager>
        AuthType openid-connect
        Require valid-user
        ProxyPass           http://branchmanager-app:80/branchmanager/
        ProxyPassReverse    http://branchmanager-app:80/branchmanager/

        # Export JWT claims
        RequestHeader set X-Staff-Id "%{OIDC_CLAIM_staffId}e"
        Header set Set-Cookie "staffId=%{OIDC_CLAIM_staffId}e; Path=/; SameSite=Lax"
    </Location>

    # Cashier App - /cashier/*
    # The app is built to be served at /cashier/ path
    <Location /cashier>
        AuthType openid-connect
        Require valid-user
        ProxyPass           http://cashier-app:80/cashier/
        ProxyPassReverse    http://cashier-app:80/cashier/

        # Export JWT claims
        RequestHeader set X-Staff-Id "%{OIDC_CLAIM_staffId}e"
        Header set Set-Cookie "staffId=%{OIDC_CLAIM_staffId}e; Path=/; SameSite=Lax"
    </Location>

    # Mifos Web App - /mifos/* (Commented out - image not available)
    # <Location /mifos>
    #     AuthType openid-connect
    #     Require valid-user
    #     ProxyPass           http://mifos-app:80/
    #     ProxyPassReverse    http://mifos-app:80/
    # </Location>

    # Root redirect - redirect to cashier app by default
    RedirectMatch ^/$ /cashier

</VirtualHost>

services:
  db:
    extends:
      file: ./config/docker/compose/mariadb.yml
      service: mariadb
    networks:
      - fineract-network

  fineract:
    extends:
      file: ./config/docker/compose/fineract.yml
      service: fineract
    ports:
      - "443:8443"
    networks:
      - fineract-network
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    env_file:
      - ./config/docker/env/fineract.env
      - ./config/docker/env/fineract-common.env
      - ./config/docker/env/fineract-mariadb.env
      - ./config/docker/env/fineract-adorsys.env
    volumes:
      - ./fineract-adorsys-pentaho/MifosSecurityPlugin-1.12.1:/app/plugins
      - ./fineract-adorsys-pentaho/MifosSecurityPlugin-1.12.1:/pentahoReports

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    command: >
      start-dev
      --health-enabled=true
      --spi-theme-static-max-age=-1
      --spi-theme-cache-themes=false
      --spi-theme-cache-templates=false
      --hostname-strict=false
      --http-enabled=true
    env_file:
      - ./config/docker/env/fineract-adorsys.env
    ports:
      - "9000:8080"
      - "8180:9000"
    volumes:
      - ./fineract-adorsys-keycloak-theme/theme-1.0.1.jar:/opt/keycloak/providers/theme-1.0.1.jar:ro
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 sh -c 'cat < /dev/null > /dev/tcp/localhost/9000' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - fineract-network


  fineract-config-cli:
    build:
      context: fineract-adorsys-data-collection/fineract-config-cli
      dockerfile: Dockerfile
    depends_on:
      fineract:
        condition: service_healthy
    env_file:
      - ./config/docker/env/fineract-adorsys.env
    volumes:
      - ./fineract-adorsys-data-collection/fineract-config-cli/config:/config
      - ./fineract-adorsys-data-collection/fineract-config-cli/data:/data
    networks:
      - fineract-network
    restart: "no"

    
  keycloak-config-cli:
    image: adorsys/keycloak-config-cli:latest
    depends_on:
      keycloak:
        condition: service_healthy
    env_file:
      - ./config/docker/env/fineract-adorsys.env
    volumes:
      - ./fineract-adorsys-keycloak-config:/config
    networks:
      - fineract-network

  keycloak-setup:
    build:
      context: .
      dockerfile: Dockerfile.adorsys-keycloak-setup
    depends_on:
      keycloak-config-cli:
        condition: service_completed_successfully
    networks:
      - fineract-network

  sms-gateway:
    build:
      context: fineract-adorsys-sms-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      fineract:
        condition: service_healthy
    networks:
      - fineract-network

  apache-proxy:
    build:
      context: config/fineract-adorsys-apache
    depends_on:
      - fineract
      - keycloak
      # - admin-app  # Commented out - image not available in registry
      # - cashier-app
      # - branchmanager-app
      # - accountmanager-app
      # - mifos-app  # Commented out - image not available in registry
    ports:
      - "80:80"
    volumes:
      - ./config/fineract-adorsys-apache/httpd.conf:/usr/local/apache2/conf/httpd.conf
    networks:
      - fineract-network


twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.sender.number=${TWILIO_SENDER_NUMBER}
fineract.api.url=${FINERACT_API_URL:https://localhost/fineract-provider/api/v1}
fineract.api.user=${FINERACT_API_USER:mifos}
fineract.api.password=${FINERACT_API_PASSWORD:password}

# OAuth2 Configuration
fineract.auth.type=${FINERACT_AUTH_TYPE:basic}
keycloak.url=${KEYCLOAK_URL:http://localhost:9000/realms/fineract/protocol/openid-connect/token}
keycloak.grant-type=${KEYCLOAK_GRANT_TYPE:password}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:setup-app-client}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:**********}
